# ──────────────────────────────────────────────
# html-devops-lab · GitHub Actions
# Pipeline: Build Docker → Push Hub → Deploy EC2
# Dispara em push para a branch main
# ──────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ── JOB 1: Build e Push no Docker Hub ─────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/html-devops-lab:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/html-devops-lab:${{ github.sha }}

  # ── JOB 2: Deploy na EC2 ──────────────────────
  deploy:
    name: Deploy na AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push    # Só roda após o build ter sucesso

    steps:
      - name: Deploy via SSH na EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Para container atual (ignora erro se não existir)
            docker stop html-devops-lab || true
            docker rm   html-devops-lab || true

            # Puxa a imagem mais recente
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/html-devops-lab:latest

            # Sobe o novo container
            docker run -d \
              --name html-devops-lab \
              -p 80:80 \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/html-devops-lab:latest

            echo "✅ Deploy concluído com sucesso!"
